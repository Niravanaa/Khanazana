name: E2E Tests

on:
  pull_request:
    branches: [main]

env:
  SUPABASE_LOCAL_URL: http://localhost:54331
  DATABASE_URL: postgresql://postgres:postgres@localhost:54332/postgres
  DIRECT_URL: postgresql://postgres:postgres@localhost:54332/postgres
  E2E_EMAIL: e2e@khanazana.test
  E2E_PASSWORD: e2etest123

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: |
          supabase stop --no-backup 2>/dev/null || true
          supabase start

      - name: Apply database migrations
        run: pnpm prisma migrate deploy

      - name: Seed storage bucket and policies
        run: psql "$DATABASE_URL" -f supabase/seed.sql

      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Next.js app
        working-directory: apps/frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_LOCAL_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.LOCAL_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Run E2E tests
        working-directory: apps/frontend
        run: pnpm e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_LOCAL_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.LOCAL_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ env.SUPABASE_LOCAL_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.LOCAL_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LOCAL_SUPABASE_SERVICE_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
