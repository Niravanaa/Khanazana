name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Format check
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage gate
        run: pnpm test

      - name: Build
        run: pnpm build
